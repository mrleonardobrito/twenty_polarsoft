name: Deploy AWS

on:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS with EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USER }}
            key: ${{ secrets.SSH_KEY }}
            port: ${{ secrets.SSH_PORT || 22 }}
            script: |
                set -euo pipefail
                cd ~/twenty_polarsoft
                PREVIOUS_IMAGE=$(docker compose images -q server | head -1)
                docker pull ${{ env.IMAGE_NAME }}:latest
                docker compose pull
                docker compose up -d --remove-orphans --wait
                echo "Aguardando health check..."
                for i in $(seq 1 12); do
                  if docker compose ps | grep -q "healthy"; then
                    echo "✅ Aplicação saudável"
                    break
                  fi
                  if [ $i -eq 12 ]; then
                    echo "❌ Health check falhou — iniciando rollback"
                    docker compose down
                    # Rollback para imagem anterior
                    docker tag "$PREVIOUS_IMAGE" twenty_server:rollback
                    docker compose up -d
                    exit 1
                  fi
                  sleep 5
                done
                docker system prune -f
